version: '3.8'

services:
  orders-service:
    build: .
    ports:
      - "50051:50051"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - PORT=50051
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
