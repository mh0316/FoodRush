services:
  user-database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user-database-data:/var/lib/postgresql/data
      - ./user-service/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: foodrush-user-service:local
    restart: unless-stopped
    environment:
      DB_HOST: user-database
      DB_PORT: ${USER_DB_PORT}
      DB_USER: ${USER_DB_USER}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      DB_NAME: ${USER_DB_NAME}
      DB_SSLMODE: ${USER_DB_SSLMODE}
      GRPC_PORT: ${USER_SERVICE_GRPC_PORT}
    depends_on:
      user-database:
        condition: service_healthy

  catalog-database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
      POSTGRES_DB: ${CATALOG_DB_NAME}
    volumes:
      - catalog-database-data:/var/lib/postgresql/data
      - ./catalog-service/init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d ${CATALOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog-service:
    build: ./catalog-service
    restart: on-failure
    depends_on:
      catalog-database:
        condition: service_healthy
    environment:
      DB_URL: user=${CATALOG_DB_USER} password=${CATALOG_DB_PASSWORD} host=catalog-database port=${CATALOG_DB_PORT} dbname=${CATALOG_DB_NAME} sslmode=${CATALOG_DB_SSLMODE}

  orders-database:
    image: mongo:latest
    volumes:
      - orders-database-data:/data/db

  orders-service:
    build: ./order-service
    environment:
      - MONGO_URI=mongodb://orders-database:${ORDERS_DB_PORT}
      - PORT=${ORDERS_SERVICE_GRPC_PORT}
    depends_on:
      - orders-database

  payment-database:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    volumes:
      - payment-database-data:/var/lib/postgresql/data

  payments-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${PAYMENT_DB_HOST}
      DB_PORT: ${PAYMENT_DB_PORT}
      DB_USER: ${PAYMENT_DB_USER}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      DB_NAME: ${PAYMENT_DB_NAME}
      PORT: ${PAYMENTS_SERVICE_GRPC_PORT}
    depends_on:
      - payment-database

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT}:8080"
    environment:
      API_GATEWAY_PORT: 8080
      USER_SERVICE_ADDR: ${USER_SERVICE_ADDR}
      CATALOG_SERVICE_ADDR: ${CATALOG_SERVICE_ADDR}
      ORDERS_SERVICE_ADDR: ${ORDERS_SERVICE_ADDR}
      PAYMENTS_SERVICE_ADDR: ${PAYMENTS_SERVICE_ADDR}
    depends_on:
      - user-service
      - catalog-service
      - orders-service
      - payments-service

volumes:
  user-database-data:
  catalog-database-data:
  orders-database-data:
  payment-database-data:
