syntax = "proto3";

package users;

option go_package = "github.com/jesus-acev/user-service/pb";

// ─ Mensajes ─────────────────────────────────────────────

message User {
  string id             = 1;
  string nombre         = 2;
  string correo         = 3;
  string payment_token  = 4;
  string status         = 5;
}

message CreateUserRequest {
  string nombre         = 1;
  string correo         = 2;
  string password       = 3;
  string payment_token  = 4;
}
message CreateUserResponse { User user = 1; }

message GetUserProfileRequest  { string id = 1; }
message GetUserProfileResponse { User user = 1; }

// ─ Servicio ─────────────────────────────────────────────

service UsersService {
  rpc CreateUser      (CreateUserRequest)      returns (CreateUserResponse);
  rpc GetUserProfile  (GetUserProfileRequest)  returns (GetUserProfileResponse);
}
